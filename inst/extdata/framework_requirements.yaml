version: 0.2.0
updated: 2026-04-21
requirements:
  - id: G0A-CLAIM-SCOPE-001
    gate: G0A
    requirement_text: Claim card must declare claim scope, semantics, audience, and stakes.
    evidence_type: computed
    severity_if_missing: fail
    applicability: {}
    artifact_fields: [claim, claim_card]
    metric_fields: [claim_global, claim_local, claim_decision, semantics, audience, stakes]
    tests_required: [T-G0A-001]

  - id: G0A-DECISION-SPEC-002
    gate: G0A
    requirement_text: Decision-scoped claims must provide thresholds and utility/cost assumptions or an explicit warning/restriction.
    evidence_type: computed
    severity_if_missing: warn
    applicability:
      claims_decision: true
    metric_fields: [n_thresholds, has_utility]
    tests_required: [T-G0A-002]

  - id: G0A-CAUSAL-HARDSTOP-003
    gate: G0A
    requirement_text: Causal/recourse semantics require assumptions and actionability; if unsupported by the workflow, trigger a hard-stop safeguard.
    evidence_type: computed
    severity_if_missing: fail
    applicability:
      semantics: [causal_recourse]
    metric_fields: [hard_stop, has_actionability]
    artifact_fields: [claim, missing_codes]
    tests_required: [T-G0A-003]

  - id: G0B-MEASUREMENT-001
    gate: G0B
    requirement_text: Measurement level, reliability/comparability evidence, and missingness handling must be documented before strong interpretation claims.
    evidence_type: user_provided
    severity_if_missing: warn
    applicability:
      purpose: [global_insight, decision_support, deployment]
    metric_fields: [measurement_level, has_reliability, has_missingness_plan]
    artifact_fields: [measurement, missingness]
    tests_required: [T-G0B-001]

  - id: G1-VALIDITY-001
    gate: G1
    requirement_text: Predictive adequacy must be established with honest resampling, uncertainty, and leakage-aware workflows.
    evidence_type: computed
    severity_if_missing: fail
    applicability: {}
    artifact_fields: [scores, rr, uncertainty, validation_design]
    tests_required: [T-G1-001]

  - id: G2-SEMANTICS-SUPPORT-001
    gate: G2
    requirement_text: Global structure summaries must be semantics-labeled and accompanied by at least one gate-aligned global effect family.
    evidence_type: computed
    severity_if_missing: warn
    applicability: {}
    artifact_fields: [recommendation]
    metric_fields: [semantics, recommended_effect_method]
    artifact_any_of: [ale_curves, pd_curves]
    tests_required: [T-G2-001]

  - id: G2-HETEROGENEITY-002
    gate: G2
    requirement_text: A single global story should be accompanied by some heterogeneity screen (ICE spread, interaction screen, or regionalization evidence).
    evidence_type: computed
    severity_if_missing: warn
    applicability: {}
    artifact_any_of: [ice_spread, hstats, gadget_regions]
    tests_required: [T-G2-002]

  - id: G3-CAL-UTILITY-001
    gate: G3
    requirement_text: Decision claims require calibration and utility/net-benefit evidence over the relevant thresholds.
    evidence_type: computed
    severity_if_missing: warn
    applicability:
      claims_decision: true
    artifact_fields: [reliability, dca]
    metric_fields: [utility_spec]
    tests_required: [T-G3-001]

  - id: G3-CAL-UTILITY-002
    gate: G3
    requirement_text: Controlled decision support should document the evaluated decision range and the utility/cost specification used to justify it.
    evidence_type: computed
    severity_if_missing: warn
    applicability:
      claims_decision: true
    artifact_fields: [utility_curve, utility_spec, decision_range]
    tests_required: [T-G3-002]

  - id: G4-FAITHFULNESS-001
    gate: G4
    requirement_text: Local/regional claims require faithfulness diagnostics aligned to the declared semantics.
    evidence_type: computed
    severity_if_missing: warn
    applicability:
      claims_any: [local, decision]
    artifact_fields: [shap_check, perturbation_design]
    artifact_any_of: [faithfulness_summary, surrogate_spec]
    tests_required: [T-G4-001]

  - id: G5-STABILITY-001
    gate: G5
    requirement_text: Explanation stability under perturbation/resampling must be quantified for the patterns actually narrated.
    evidence_type: computed
    severity_if_missing: warn
    applicability: {}
    artifact_fields: [perm_importance, perf_ci]
    metric_fields: [any_unstable, stability_tier]
    tests_required: [T-G5-001]

  - id: G6-MULTIPLICITY-001
    gate: G6
    requirement_text: Multiplicity evidence should document the alternative-learner benchmark and the Rashomon summary when stronger claims are made.
    evidence_type: computed
    severity_if_missing: warn
    applicability:
      purpose: [global_insight, decision_support, deployment]
    artifact_fields: [alt_learner_performance, rashomon_provenance]
    artifact_any_of: [rashomon_set, predictive_multiplicity, explanation_multiplicity]
    metric_fields: [multiplicity_assessed]
    tests_required: [T-G6-001]

  - id: G6-TRANSPORT-002
    gate: G6
    requirement_text: Transport claims should be paired with an explicit shift assessment or a documented note that transport was not claimed.
    evidence_type: computed
    severity_if_missing: warn
    applicability:
      transport_claimed: true
    artifact_fields: [shift_assessment]
    metric_fields: [transport_assessed]
    tests_required: [T-G6-002]

  - id: G7A-SUBGROUPS-001
    gate: G7A
    requirement_text: Decision-scoped claims require subgroup performance/calibration evidence, with measurement-comparability caveats made explicit when needed.
    evidence_type: computed
    severity_if_missing: fail
    applicability:
      claims_decision: true
    artifact_fields: [subgroup]
    metric_fields: [n_group_vars]
    tests_required: [T-G7A-001]

  - id: G7B-HUMAN-001
    gate: G7B
    requirement_text: User-facing claims require external human-factors evidence metadata.
    evidence_type: external_study
    severity_if_missing: fail
    applicability:
      audience_user_facing: true
      claims_any: [local, decision]
    artifact_fields: [human_factors_evidence]
    metric_fields: [required, provided]
    tests_required: [T-G7B-001]

  - id: IEL-CLAIM-SCOPED-001
    gate: IEL
    requirement_text: IEL must be claim-scoped (G/L/D) and conservative overall.
    evidence_type: computed
    severity_if_missing: fail
    applicability: {}
    artifact_fields: [overall, global, local, decision, requested]
    tests_required: [T-IEL-001]

  - id: REPORT-CARD-001
    gate: REPORT
    requirement_text: Report card must expose gate status and claim-scoped IEL fields.
    evidence_type: computed
    severity_if_missing: fail
    applicability: {}
    artifact_fields: [gate_id, gate_name, pdr, status, summary, iel_overall, iel_global, iel_local, iel_decision, requested_scopes]
    tests_required: [T-REPORT-001]
